<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MTEJA AI · Business Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   MTEJA AI · LAKE VICTORIA BRAND IDENTITY
   Primary: Deep Forest #053D2C / Lake Green #065F46
   Accent:  Sunrise Gold #D97706
   Wave:    #10B981  Sky: #0EA5E9
════════════════════════════════════════════════════════════════*/
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap');
:root{
  --forest:#053D2C; --lake:#065F46; --reed:#0D7A57; --wave:#10B981;
  --gold:#D97706; --gold-l:#F59E0B; --sky:#0EA5E9;
  --moon:#F0FDF4; --pebble:#E2E8F0; --dusk:#475569; --night:#0A1628;
}
@keyframes waveFlow{from{transform:translateX(0)}to{transform:translateX(33.33%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--moon);min-height:100vh}

/* ── LOGO SVG INLINE ── */
.mteja-logo{display:block}

/* ── LOGIN ── */
#login{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(170deg,var(--forest) 0%,var(--lake) 55%,#091a10 100%);
  position:relative;overflow:hidden;
}
.l-star{position:absolute;width:2px;height:2px;border-radius:50%;background:#FCD34D;animation:shimmer 3s ease-in-out infinite}
.l-waves{position:absolute;bottom:0;left:-100%;width:300%;height:70px;pointer-events:none}
.lw{position:absolute;bottom:0;width:100%;height:100%;display:block}
.lw1{animation:waveFlow 9s linear infinite;opacity:.28}
.lw2{animation:waveFlow 13s linear -4s infinite;opacity:.5}
.lw3{animation:waveFlow 17s linear -8s infinite;opacity:.82}
.login-card{
  background:rgba(255,255,255,.97);border-radius:28px;padding:44px 34px 36px;
  width:100%;max-width:370px;box-shadow:0 40px 100px rgba(0,0,0,.4);
  position:relative;z-index:2;animation:fadeUp .65s cubic-bezier(.22,1,.36,1);
}
.login-logo-wrap{display:flex;justify-content:center;margin-bottom:20px}
.login-title{text-align:center;font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:900;color:var(--forest);margin-bottom:3px;line-height:1}
.login-title .ai{color:var(--gold)}
.login-sub{text-align:center;color:var(--dusk);font-size:13px;margin-bottom:4px}
.login-tagline{text-align:center;font-size:11px;font-weight:700;color:var(--wave);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:28px}
.login-card label{display:block;font-size:11px;font-weight:700;color:var(--dusk);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.login-card input{width:100%;padding:13px 15px;border:1.5px solid var(--pebble);border-radius:11px;font-size:15px;color:#0f172a;margin-bottom:14px;font-family:system-ui;transition:border .2s}
.login-card input:focus{outline:none;border-color:var(--lake)}
.login-btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--lake),var(--forest));
  color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.4px;transition:all .2s;
  box-shadow:0 6px 20px rgba(6,95,70,.35);font-family:system-ui;
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(6,95,70,.4)}
.login-msg{text-align:center;font-size:13px;margin-top:12px;min-height:18px}
.login-footer{text-align:center;font-size:11px;color:var(--dusk);margin-top:18px;opacity:.7}

/* ── APP ── */
#app{display:none}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,var(--forest) 0%,var(--lake) 100%);padding:0 16px;position:sticky;top:0;z-index:10;color:#fff}
.header-inner{padding:16px 0 12px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.hdr-brand{display:flex;align-items:center;gap:10px}
.biz-code{font-size:10px;color:#6ee7b7;font-weight:700;letter-spacing:2px;margin-bottom:2px;font-family:monospace}
.biz-name{font-size:18px;font-weight:900;font-family:'Playfair Display',Georgia,serif}
.biz-type{font-size:12px;color:rgba(167,243,208,.85);margin-top:1px}
.logout-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);border-radius:9px;padding:7px 13px;font-size:12px;cursor:pointer;transition:all .2s;font-family:system-ui}
.logout-btn:hover{background:rgba(255,255,255,.22)}
.qs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.qs-box{background:rgba(255,255,255,.1);border-radius:11px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,.08)}
.qs-val{font-size:20px;font-weight:900;font-family:'Inter',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:"tnum","lnum";letter-spacing:-0.5px}
.qs-lbl{font-size:10px;color:#6ee7b7;font-weight:600;margin-top:2px;font-family:system-ui}
.hdr-wave{height:44px;position:relative;overflow:hidden;margin:0 -16px}
.hw{position:absolute;bottom:0;width:300%;left:-100%;height:100%;display:block}
.hw1{animation:waveFlow 10s linear infinite;opacity:.22}
.hw2{animation:waveFlow 14s linear -4s infinite;opacity:.42}
.hw3{animation:waveFlow 18s linear -8s infinite;opacity:.72}

/* ── TABS ── */
.tabs{background:#fff;border-bottom:2px solid var(--moon);display:flex;overflow-x:auto;position:sticky;top:186px;z-index:9;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.tab{flex:0 0 auto;background:none;border:none;padding:13px 16px;font-size:13px;font-weight:600;color:var(--dusk);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:system-ui;margin-bottom:-2px}
.tab:hover{color:var(--lake)}
.tab.on{color:var(--lake);border-bottom-color:var(--gold)}

/* ── BODY ── */
.body{max-width:680px;margin:0 auto;padding:16px 14px 80px}
.section{background:#fff;border-radius:16px;padding:18px;border:1px solid var(--pebble);margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.stitle{font-size:15px;font-weight:800;color:#0f172a;margin-bottom:14px;font-family:'Playfair Display',Georgia,serif}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:#fff;border-radius:14px;padding:16px;border:1px solid var(--pebble);border-left:4px solid var(--c);box-shadow:0 2px 6px rgba(0,0,0,.04)}
.stat-lbl{font-size:10px;color:#94a3b8;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:900;color:#0f172a;font-family:'Inter',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:"tnum","lnum";letter-spacing:-0.5px}
.stat-sub{font-size:12px;color:var(--c);margin-top:4px;font-weight:600}
.row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f8fafc}
.row:last-child{border:none}
.rn{font-size:14px;font-weight:700;color:#0f172a}
.ri{font-size:12px;color:#94a3b8}
.ra{font-size:15px;font-weight:800;color:var(--lake);font-family:'Inter',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:"tnum","lnum";letter-spacing:-0.3px}
.rp{font-size:11px;color:var(--gold-l);font-weight:700}
.ccard{background:#fff;border-radius:14px;padding:14px;border:1px solid var(--pebble);margin-bottom:8px;box-shadow:0 2px 6px rgba(0,0,0,.04);transition:box-shadow .2s}
.ccard:hover{box-shadow:0 4px 16px rgba(0,0,0,.09)}
.cname{font-size:15px;font-weight:800;color:#0f172a;font-family:'Playfair Display',Georgia,serif}
.cphone{font-size:12px;color:var(--dusk);margin-top:2px}
.badge{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.cgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.cs{background:var(--moon);border-radius:8px;padding:8px;text-align:center}
.csv{font-size:13px;font-weight:700;color:#0f172a;font-family:'Inter',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.csl{font-size:10px;color:#94a3b8}
.srch{width:100%;padding:11px 14px;border-radius:11px;border:1.5px solid var(--pebble);font-size:14px;color:#0f172a;margin-bottom:14px}
.srch:focus{outline:none;border-color:var(--lake)}
.fu-card{background:#fff;border-radius:14px;padding:16px;border-left:4px solid #ef4444;border:1px solid var(--pebble);margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.fu-msg{background:var(--moon);border-radius:9px;padding:11px 13px;font-size:13px;color:var(--lake);font-style:italic;margin:10px 0;border-left:3px solid var(--wave);line-height:1.6}
.wa-btn{display:block;text-align:center;background:#25D366;color:#fff;border-radius:11px;padding:11px;font-size:13px;font-weight:700;text-decoration:none;transition:opacity .2s}
.wa-btn:hover{opacity:.9}
.empty{color:#94a3b8;font-size:14px;padding:24px 0;text-align:center}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--pebble);padding:10px;text-align:center;font-size:12px;color:var(--dusk)}
.footer .brand{color:var(--lake);font-weight:700;font-family:'Playfair Display',Georgia,serif}
.footer .tagline{color:var(--gold);font-style:italic}

/* ── CONTACT ── */
.c-actions{display:flex;gap:8px;margin-top:10px}
.c-call{flex:1;padding:8px;border-radius:9px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:700;text-decoration:none;text-align:center}
.c-wa{flex:1;padding:8px;border-radius:9px;background:#dcfce7;color:#15803d;font-size:12px;font-weight:700;text-decoration:none;text-align:center}
.c-sms{flex:1;padding:8px;border-radius:9px;background:#fef3c7;color:#92400e;font-size:12px;font-weight:700;text-decoration:none;text-align:center}

/* ── BROADCAST ── */
.bc-seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.bc-seg-box{background:#fff;border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--pebble);box-shadow:0 2px 6px rgba(0,0,0,.04)}
.bc-seg-val{font-size:20px;font-weight:900;font-family:'Inter',system-ui,sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.bc-seg-lbl{font-size:10px;color:#94a3b8;margin-top:2px}
.compose-box{background:#fff;border-radius:16px;border:1px solid var(--pebble);padding:16px;margin-bottom:14px}
.tpl-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tpl-pill{padding:6px 12px;border-radius:20px;border:1px solid var(--pebble);background:var(--moon);font-size:12px;font-weight:700;color:var(--dusk);cursor:pointer;white-space:nowrap;transition:all .2s}
.tpl-pill:hover{border-color:var(--lake);color:var(--lake)}
.tpl-pill.sel{background:var(--lake);color:#fff;border-color:var(--lake)}
.compose-hint{font-size:11px;color:#94a3b8;margin-bottom:8px}
.compose-hint b{color:var(--lake)}
textarea{width:100%;padding:12px;border:1.5px solid var(--pebble);border-radius:11px;font-size:14px;font-family:system-ui;resize:none;line-height:1.6;color:#0f172a;min-height:120px}
textarea:focus{outline:none;border-color:var(--lake)}
.preview-box{background:linear-gradient(135deg,var(--moon),#d1fae5);border-radius:14px;padding:14px;margin-bottom:14px;border:1px solid #a7f3d0}
.preview-lbl{font-size:10px;font-weight:700;color:var(--lake);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.preview-bubble{background:#fff;border-radius:0 12px 12px 12px;padding:12px 14px;font-size:14px;line-height:1.6;color:#0f172a;white-space:pre-wrap;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.wa-guide{background:#fff;border-radius:16px;border:1px solid var(--pebble);overflow:hidden;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.wa-guide-hd{background:linear-gradient(135deg,#25D366,#128C7E);padding:14px 16px;color:#fff}
.wa-guide-title{font-size:15px;font-weight:800;font-family:'Playfair Display',Georgia,serif}
.wa-guide-sub{font-size:12px;opacity:.85;margin-top:2px}
.wa-guide-body{padding:16px}
.step-item{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.step-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--lake),var(--reed));color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:#0f172a;line-height:1.5}
.step-text b{color:var(--lake)}
.copy-btn{width:100%;padding:12px;border-radius:11px;background:var(--moon);border:1.5px solid var(--lake);color:var(--lake);font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;transition:all .2s}
.copy-btn:hover{background:var(--lake);color:#fff}
.nums-box{background:var(--moon);border-radius:8px;padding:10px;font-size:12px;font-family:monospace;color:#0f172a;line-height:1.8;margin-top:8px;max-height:120px;overflow-y:auto;display:none;word-break:break-all}
.send-all-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.swa-btn{padding:14px;border-radius:12px;background:#25D366;color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer}
.ssm-btn{padding:14px;border-radius:12px;background:var(--sky);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer}
.send-note{font-size:11px;color:#94a3b8;text-align:center;margin-bottom:12px;line-height:1.5}
.bc-list{background:#fff;border-radius:14px;border:1px solid var(--pebble);overflow:hidden;margin-bottom:14px}
.bc-list-hd{padding:12px 14px;background:var(--moon);border-bottom:1px solid var(--pebble);font-size:11px;font-weight:700;color:var(--dusk);text-transform:uppercase;letter-spacing:.8px}
.bc-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #f8fafc}
.bc-row:last-child{border:none}
.bc-rname{font-size:14px;font-weight:700;color:#0f172a}
.bc-rphone{font-size:11px;color:#94a3b8}
.bc-wa{padding:6px 10px;border-radius:7px;background:#dcfce7;color:#15803d;border:none;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none}
.bc-sms{padding:6px 10px;border-radius:7px;background:#dbeafe;color:#1d4ed8;border:none;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none}
.bc-sent{font-size:11px;font-weight:700;color:#15803d;padding:4px 8px;background:#dcfce7;border-radius:6px}

/* ── PRO CARD ── */
.pro-card{
  background:linear-gradient(135deg,var(--forest) 0%,var(--lake) 70%,var(--reed) 100%);
  border-radius:20px;padding:26px;margin-bottom:14px;color:#fff;
  position:relative;overflow:hidden;border:1px solid rgba(16,185,129,.25);
}
.pro-card::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
.pro-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:32px;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 600 32' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,16 C75,4 150,28 225,16 C300,4 375,28 450,16 C525,4 575,24 600,16 L600,32 L0,32 Z' fill='rgba(16,185,129,0.15)'/%3E%3C/svg%3E") center bottom/cover no-repeat;pointer-events:none}
.pro-badge{background:linear-gradient(135deg,var(--gold),var(--gold-l));border-radius:20px;padding:4px 14px;font-size:11px;font-weight:800;display:inline-block;margin-bottom:12px;color:#fff;letter-spacing:.5px}
.pro-title{font-size:18px;font-weight:900;margin-bottom:6px;font-family:'Playfair Display',Georgia,serif}
.pro-sub{font-size:13px;opacity:.85;margin-bottom:16px;line-height:1.6}
.pro-feat{list-style:none;margin-bottom:18px}
.pro-feat li{font-size:13px;margin-bottom:8px;padding-left:28px;position:relative;opacity:.9}
.pro-feat li::before{content:'✓';position:absolute;left:0;background:rgba(16,185,129,.25);border:1px solid rgba(16,185,129,.4);border-radius:50%;width:19px;height:19px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.pro-cta{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;border:none;border-radius:12px;padding:14px;width:100%;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.4px;transition:all .2s}
.pro-cta:hover{opacity:.9;transform:translateY(-1px)}

/* ── MONEY / FINANCIAL FIGURES ── */
.money{
  font-family:'Inter',system-ui,sans-serif;
  font-weight:800;
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum","lnum";
  letter-spacing:-0.5px;
}
.money-lg{
  font-family:'Inter',system-ui,sans-serif;
  font-weight:900;
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum","lnum";
  letter-spacing:-1px;
  line-height:1;
}
.ksh-prefix{
  font-family:'Inter',system-ui,sans-serif;
  font-weight:600;
  font-size:0.7em;
  letter-spacing:0.5px;
  opacity:0.8;
  vertical-align:middle;
  margin-right:1px;
}
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div id="login">
  <!-- Stars -->
  <div class="l-star" style="top:12%;left:8%;animation-delay:0s;width:3px;height:3px"></div>
  <div class="l-star" style="top:22%;left:82%;animation-delay:.9s"></div>
  <div class="l-star" style="top:8%;left:52%;animation-delay:1.6s;width:3px;height:3px"></div>
  <div class="l-star" style="top:38%;left:92%;animation-delay:.4s"></div>
  <div class="l-star" style="top:6%;left:28%;animation-delay:2.1s"></div>
  <div class="l-star" style="top:32%;left:15%;animation-delay:1.1s"></div>
  <!-- Waves -->
  <div class="l-waves">
    <svg class="lw lw1" viewBox="0 0 1440 70" preserveAspectRatio="none"><path d="M0,35 C180,10 360,60 540,35 C720,10 900,60 1080,35 C1260,10 1440,60 1440,35 L1440,70 L0,70 Z" fill="#0D7A57"/></svg>
    <svg class="lw lw2" viewBox="0 0 1440 70" preserveAspectRatio="none"><path d="M0,35 C180,10 360,60 540,35 C720,10 900,60 1080,35 C1260,10 1440,60 1440,35 L1440,70 L0,70 Z" fill="#065F46"/></svg>
    <svg class="lw lw3" viewBox="0 0 1440 70" preserveAspectRatio="none"><path d="M0,35 C180,10 360,60 540,35 C720,10 900,60 1080,35 C1260,10 1440,60 1440,35 L1440,70 L0,70 Z" fill="#053D2C"/></svg>
  </div>
  <div class="login-card">
    <div class="login-logo-wrap">
      <!-- MTEJA AI LAKE VICTORIA LOGO -->
      <svg width="80" height="80" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#053D2C"/><stop offset="100%" stop-color="#065F46"/></linearGradient>
          <linearGradient id="w1G" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#10B981" stop-opacity="0.9"/><stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.7"/></linearGradient>
          <linearGradient id="w2G" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#0D7A57"/><stop offset="100%" stop-color="#10B981"/></linearGradient>
          <linearGradient id="sunG" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FCD34D"/><stop offset="100%" stop-color="#D97706" stop-opacity="0.7"/></linearGradient>
          <clipPath id="rr"><rect width="96" height="96" rx="22"/></clipPath>
        </defs>
        <rect width="96" height="96" rx="22" fill="url(#bgG)"/>
        <rect x="0" y="0" width="96" height="52" fill="#053D2C" clip-path="url(#rr)"/>
        <!-- Sun -->
        <circle cx="48" cy="30" r="11" fill="url(#sunG)" opacity="0.92"/>
        <line x1="48" y1="17" x2="48" y2="13" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

const SB=window.supabase.createClient("https://ypwmlgvgssdkicrlkhii.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwd21sZ3Znc3Nka2ljcmxraGlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjg0ODgsImV4cCI6MjA5MTk0NDQ4OH0.8U1rsJ4RsUUiMPLWC2cHx9pcZgmpQXDjqdPGppVudq8");
let BIZ=null,CUSTS=[],TXNS=[];

async function doLogin(){
  const phone=document.getElementById("iphone").value.trim();
  const code=document.getElementById("icode").value.trim().toUpperCase();
  const msg=document.getElementById("msg");
  if(!phone||!code){msg.style.color="#ef4444";msg.textContent="Jaza namba na code.";return;}
  msg.style.color="#f59e0b";msg.textContent="Inakagua...";
  try{
    const{data,error}=await SB.from("businesses").select("*").eq("phone",phone).eq("code",code).single();
    if(error||!data){msg.style.color="#ef4444";msg.textContent="Haikupatikana. Angalia namba na code.";return;}
    msg.style.color="#10b981";msg.textContent="✅ Inafungua dashboard...";
    BIZ=data;localStorage.setItem("m_session",JSON.stringify({phone,code}));
    setTimeout(showApp,600);
  }catch(e){msg.style.color="#ef4444";msg.textContent=e.message;}
}

function doLogout(){localStorage.removeItem("m_session");location.reload();}

function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("hcode").textContent=BIZ.code;
  document.getElementById("hname").textContent=BIZ.name||"My Business";
  document.getElementById("htype").textContent=(BIZ.type||"")+" · Since "+new Date(BIZ.created_at).toLocaleDateString("en-KE",{month:"short",year:"numeric"});
  loadAll();
}

async function loadAll(){
  const p=BIZ.phone,wk=new Date(Date.now()-7*86400000).toISOString();
  const[cr,tr]=await Promise.all([
    SB.from("customers").select("*").eq("business_phone",p).order("total_spent",{ascending:false}),
    SB.from("transactions").select("*").eq("business_phone",p).order("created_at",{ascending:false}).limit(50)
  ]);
  CUSTS=cr.data||[];TXNS=tr.data||[];
  const wkRev=TXNS.filter(t=>t.created_at>wk).reduce((s,t)=>s+t.amount,0);
  const ov=CUSTS.filter(c=>Math.floor((Date.now()-new Date(c.last_visit))/86400000)>=18);
  document.getElementById("qr").textContent="Ksh "+wkRev.toLocaleString();
  document.getElementById("qc").textContent=CUSTS.length;
  document.getElementById("qf").textContent=ov.length;
  drawOv(wkRev,ov);drawCu();drawTx();drawFu(ov);drawBc();
}

function drawOv(wkRev,ov){
  const tot=TXNS.reduce((s,t)=>s+t.amount,0);

  document.getElementById("pov").innerHTML=`
    <div class="grid2">

      <div class="stat" style="--c:#0ea5e9"><div class="stat-lbl">Total Sales</div><div class="stat-val">${TXNS.length}</div><div class="stat-sub">Wastani Ksh ${avg.toLocaleString()}</div></div>
      <div class="stat" style="--c:#D97706"><div class="stat-lbl">Wateja</div><div class="stat-val">${CUSTS.length}</div><div class="stat-sub">${ov.length} wanahitaji follow-up</div></div>
      <div class="stat" style="--c:#8b5cf6"><div class="stat-lbl">Loyalty Points</div><div class="stat-val">${pts}</div><div class="stat-sub">Zawadi za uaminifu</div></div>
    </div>
    <div class="section"><div class="stitle">🏆 Wateja Bora</div>
      ${CUSTS.slice(0,3).map((c,i)=>`<div class="row"><div><div class="rn">${["🥇","🥈","🥉"][i]} ${c.name}</div><div class="ri">${c.visit_count} ziara · ${c.total_points} pts</div></div><div class="ra">Ksh ${c.total_spent.toLocaleString()}</div></div>`).join("")||"<div class='empty'>Hakuna wateja bado.</div>"}
    </div>
    <div class="section"><div class="stitle">⚡ Mauzo ya Hivi Karibuni</div>
      ${TXNS.slice(0,4).map(t=>`<div class="row"><div><div class="rn">${t.customer_name}</div><div class="ri">${t.item||"—"} · ${new Date(t.created_at).toLocaleDateString("en-KE")}</div></div><div style="text-align:right"><div class="ra">Ksh ${t.amount.toLocaleString()}</div><div class="rp">+${t.points_awarded} pts</div></div></div>`).join("")||"<div class='empty'>Hakuna mauzo bado.</div>"}
    </div>`;
}

function drawCu(q){
  q=q||"";
  const list=CUSTS.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())||(c.phone||"").includes(q));
  document.getElementById("pcu").innerHTML=`
    <input class="srch" placeholder="🔍 Tafuta jina au namba..." oninput="drawCu(this.value)" value="${q}"/>
    ${list.map(c=>{
      const d=Math.floor((Date.now()-new Date(c.last_visit))/86400000);
      const[bc,tc,lbl]=c.total_spent>5000?["#fef3c7","#92400e","⭐ VIP"]:d>=21?["#fee2e2","#991b1b","⚠ Muda"]:["#d1fae5","#065f46","● Active"];
      const raw=c.phone||"";

      const fn=encodeURIComponent(c.name.split(" ")[0]);

          <div class="cs"><div class="csv">⭐ ${c.total_points}</div><div class="csl">Points</div></div>
          <div class="cs"><div class="csv">${d}d</div><div class="csl">Ziara ya Mwisho</div></div>
        </div>
        ${raw?`<div class="c-actions">
          <a href="tel:${raw}" class="c-call">📞 Piga</a>
          <a href="https://wa.me/${wa}?text=Habari%20${fn}!" target="_blank" class="c-wa">💬 WhatsApp</a>
          <a href="sms:${raw}" class="c-sms">✉️ SMS</a>
        </div>`:""}
      </div>`;
    }).join("")||"<div class='empty'>Hakuna wateja bado.</div>"}`;
}

function drawTx(){
  document.getElementById("ptx").innerHTML=`<div class="section"><div class="stitle" style="display:flex;justify-content:space-between">Mauzo Yote <span style="color:#065F46;font-size:13px">${TXNS.length} rekodi</span></div>
    ${TXNS.map(t=>`<div class="row"><div><div class="rn">${t.customer_name}</div><div class="ri">${t.item||"—"}</div><div style="font-size:11px;color:#cbd5e1">${new Date(t.created_at).toLocaleDateString("en-KE",{day:"numeric",month:"short",year:"numeric"})}</div></div><div style="text-align:right"><div class="ra">Ksh ${t.amount.toLocaleString()}</div><div class="rp">+${t.points_awarded} pts</div></div></div>`).join("")||"<div class='empty'>Hakuna mauzo bado.</div>"}
  </div>`;
}

function drawFu(ov){
  document.getElementById("pfu").innerHTML=ov.length===0
    ?`<div class="section" style="text-align:center;color:#065F46;padding:40px;font-family:Georgia,serif">🎉<br><br><strong>Wateja wote wamekuja hivi karibuni!</strong><br><span style="font-size:13px;color:#94a3b8">Endelea kurekodi mauzo.</span></div>`
    :`<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#991b1b">⚠️ Wateja ${ov.length} hawajafika kwa siku 18+!</div>
    ${ov.map(c=>{const d=Math.floor((Date.now()-new Date(c.last_visit))/86400000),wa=(c.phone||"").replace(/^0/,"254"),fn=c.name.split(" ")[0];
    return `<div class="fu-card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div><div class="cname">${c.name}</div><div class="cphone">📞 ${c.phone||"—"}</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:700;color:#ef4444">${d} siku</div><div style="font-size:11px;color:#94a3b8">Ksh ${c.total_spent.toLocaleString()} jumla</div></div></div>
    <div class="fu-msg">💬 "${fn}! Tumekukosa sana. Kuja uone deals zetu mpya 😊"</div>

}

const TMPLS=[
  {id:"promo",lbl:"🎉 Promo",msg:"Habari {name}! 👋\nTuna *special offer* leo tu!\n🏷️ Kuja upate deal nzuri kabla haijaisha.\n\nTungoja! — {biz}"},
  {id:"thanks",lbl:"🙏 Asante",msg:"Asante sana {name}! 🌟\nTunashukuri sana ujio wako.\n⭐ Una pointi {pts} — karibu tena!\n— {biz}"},
  {id:"miss",lbl:"💔 Kukosa",msg:"Habari {name}! 😊\nTumekukosa sana!\nKuja ututembelee, tuna mambo mapya. 🎁\n— {biz}"},
  {id:"points",lbl:"⭐ Points",msg:"Habari {name}! 🌟\nUna *{pts} loyalty points* kwa {biz}!\nKuja uzitumie leo ⏰"},
  {id:"event",lbl:"🎊 Tukio",msg:"Habari {name}! 🎊\n[Andika habari yako hapa]\n\nKaribu! — {biz}"},
  {id:"custom",lbl:"✏️ Custom",msg:"Habari {name}! 👋\n\n[Andika ujumbe wako hapa]\n\n— {biz}"},
];
let selTpl="promo",sentSet=new Set(),numsVisible=false;
function bldMsg(raw,c){const fn=(c&&c.name?c.name:"Mteja").split(" ")[0];return raw.replace(/{name}/g,fn).replace(/{pts}/g,c?c.total_points:0).replace(/{biz}/g,BIZ?BIZ.name:"Sisi");}
function getMsgTxt(){return document.getElementById("bcTxt")?document.getElementById("bcTxt").value:TMPLS.find(t=>t.id===selTpl).msg;}
function updatePreview(){const raw=getMsgTxt(),first=CUSTS.find(c=>c.phone)||CUSTS[0];const el=document.getElementById("bcPreview");if(el)el.innerHTML=bldMsg(raw,first).replace(/\*([^*]+)\*/g,"<b>$1</b>").replace(/\n/g,"<br>");}
function pickTpl(id){selTpl=id;const ta=document.getElementById("bcTxt");if(ta)ta.value=TMPLS.find(t=>t.id===id).msg;document.querySelectorAll(".tpl-pill").forEach(p=>p.classList.toggle("sel",p.dataset.id===id));updatePreview();}
function toggleNums(){numsVisible=!numsVisible;const box=document.getElementById("numsBox");if(box)box.style.display=numsVisible?"block":"none";const btn=document.getElementById("showNumsBtn");if(btn)btn.textContent=numsVisible?"▲ Ficha Namba":"📋 Onyesha Namba Zote";}
function copyNums(){const nums=CUSTS.filter(c=>c.phone).map(c=>{const r=c.phone.replace(/\s+/g,"");return r.startsWith("254")?"0"+r.slice(3):r;}).join("\n");navigator.clipboard.writeText(nums).then(()=>{const b=document.getElementById("copyNumsBtn");if(b){const o=b.textContent;b.textContent="✅ Imenakiliwa!";setTimeout(()=>b.textContent=o,2500);}}).catch(()=>{alert("Long-press the numbers box to copy manually.");});}
let sendIdx=0;
function sendAllNow(type){const wp=CUSTS.filter(c=>c.phone);if(!wp.length)return;sendIdx=0;function next(){if(sendIdx>=wp.length)return;const c=wp[sendIdx];const wa=c.phone.startsWith("254")?c.phone:"254"+c.phone.replace(/^0/,"");const msg=bldMsg(getMsgTxt(),c);window.open(type==="wa"?`https://wa.me/${wa}?text=${encodeURIComponent(msg)}`:`sms:${c.phone}?body=${encodeURIComponent(msg)}`,"_blank");sentSet.add(c.phone);sendIdx++;const btn=document.getElementById("brbtn"+c.id);if(btn)btn.innerHTML='<span class="bc-sent">✓ Imetumwa</span>';if(sendIdx<wp.length)setTimeout(next,1800);}next();}
function sendOneNow(type,custId,dest){const c=CUSTS.find(x=>String(x.id)===String(custId));const wa=dest.startsWith("254")?dest:"254"+dest.replace(/^0/,"");const msg=bldMsg(getMsgTxt(),c);window.open(type==="wa"?`https://wa.me/${wa}?text=${encodeURIComponent(msg)}`:`sms:${dest}?body=${encodeURIComponent(msg)}`,"_blank");sentSet.add(dest);const btn=document.getElementById("brbtn"+custId);if(btn)btn.innerHTML='<span class="bc-sent">✓ Imetumwa</span>';}

function drawBc(){
  const wp=CUSTS.filter(c=>c.phone),np=CUSTS.filter(c=>!c.phone);

  const prev=CUSTS.find(c=>c.phone)||CUSTS[0];
  const allNums=wp.map(c=>{const r=c.phone.replace(/\s+/g,"");return r.startsWith("254")?"0"+r.slice(3):r;}).join("\n");
  document.getElementById("pbc").innerHTML=`
    <div class="bc-seg">
      <div class="bc-seg-box"><div class="bc-seg-val">${CUSTS.length}</div><div class="bc-seg-lbl">Wateja Wote</div></div>
      <div class="bc-seg-box"><div class="bc-seg-val" style="color:#15803d">${wp.length}</div><div class="bc-seg-lbl">Wana Namba</div></div>
      <div class="bc-seg-box"><div class="bc-seg-val" style="color:#D97706">${sentSet.size}</div><div class="bc-seg-lbl">Imetumwa Leo</div></div>
    </div>

      <div class="stitle" style="margin-bottom:10px">✍️ Tunga Ujumbe</div>
      <div class="tpl-pills">${TMPLS.map(t=>`<span class="tpl-pill${t.id===selTpl?" sel":""}" data-id="${t.id}" onclick="pickTpl('${t.id}')">${t.lbl}</span>`).join("")}</div>
      <div class="compose-hint">Tumia <b>{name}</b> = jina · <b>{pts}</b> = pointi · <b>{biz}</b> = biashara</div>
      <textarea id="bcTxt" oninput="updatePreview()">${tpl.msg}</textarea>
    </div>
    <div class="preview-box">
      <div class="preview-lbl">👁️ Mfano wa Ujumbe — kwa ${prev?prev.name:"—"}</div>
      <div class="preview-bubble" id="bcPreview">${bldMsg(tpl.msg,prev).replace(/\*([^*]+)\*/g,"<b>$1</b>").replace(/\n/g,"<br>")}</div>
    </div>
    <div class="wa-guide">
      <div class="wa-guide-hd">
        <div class="wa-guide-title">💬 Chaguo 1 — WhatsApp Business Broadcast (Bure & Inashauriwa)</div>
        <div class="wa-guide-sub">Tuma kwa wateja wote kwa wakati mmoja kutoka simu yako</div>
      </div>
      <div class="wa-guide-body">
        <div class="step-item"><div class="step-num">1</div><div class="step-text">Pakua <b>WhatsApp Business</b> app (bure) na uweke biashara yako</div></div>
        <div class="step-item"><div class="step-num">2</div><div class="step-text">Nakili namba za wateja hapa chini na <b>uhifadhi kama contacts</b> kwenye simu</div></div>
        <div class="step-item"><div class="step-num">3</div><div class="step-text">WhatsApp Business → <b>⋮ Menyu → Broadcast Mpya</b> → chagua wateja wako</div></div>
        <div class="step-item"><div class="step-num">4</div><div class="step-text">Nakili ujumbe wako, paste, kisha bonyeza <b>Tuma</b> ✅</div></div>
        <button class="copy-btn" id="showNumsBtn" onclick="toggleNums()" style="margin-bottom:8px">📋 Onyesha Namba Zote</button>
        <div class="nums-box" id="numsBox">${allNums}</div>
        ${wp.length>0?`<button class="copy-btn" id="copyNumsBtn" onclick="copyNums()" style="background:#065F46;color:#fff;margin-top:8px">✅ Nakili Namba Zote ${wp.length}</button>`:""}
      </div>
    </div>
    <div class="section">
      <div class="stitle">📲 Chaguo 2 — Tuma Moja kwa Moja</div>
      <p style="font-size:13px;color:#64748b;margin-bottom:14px;line-height:1.5">Inafungua WhatsApp ya kila mteja na ujumbe tayari. Wewe bonyeza Tuma.</p>
      ${wp.length===0?`<div class="empty">Hakuna wateja wenye namba bado.</div>`:`
        <div class="send-all-row">
          <button class="swa-btn" onclick="sendAllNow('wa')">💬 WhatsApp Wote (${wp.length})</button>
          <button class="ssm-btn" onclick="sendAllNow('sms')">✉️ SMS Wote (${wp.length})</button>
        </div>
        <div class="send-note">Inafungua mazungumzo ${wp.length} moja kwa moja · Bado unatumia kila moja</div>`}
      <div class="bc-list">
        <div class="bc-list-hd">Tuma kwa Mteja Mmoja</div>
        ${wp.map(c=>{const wa=c.phone.startsWith("254")?c.phone:"254"+c.phone.replace(/^0/,"");const sent=sentSet.has(c.phone);return `<div class="bc-row"><div><div class="bc-rname">${c.name}</div><div class="bc-rphone">${c.phone}</div></div><div id="brbtn${c.id}" style="display:flex;gap:6px">${sent?'<span class="bc-sent">✓ Imetumwa</span>':`<a href="#" onclick="event.preventDefault();sendOneNow('wa','${c.id}','${wa}')" class="bc-wa">💬 WA</a><a href="#" onclick="event.preventDefault();sendOneNow('sms','${c.id}','${c.phone}')" class="bc-sms">✉️ SMS</a>`}</div></div>`;}).join("")||"<div class='empty' style='padding:16px'>Hakuna wateja wenye namba.</div>"}
      </div>
      ${np.length>0?`<div style="font-size:12px;color:#94a3b8;text-align:center">⚠️ Wateja ${np.length} hawana namba</div>`:""}
    </div>
    <div class="pro-card">
      <div class="pro-badge">⚡ MTEJA PRO — Inakuja Hivi Karibuni</div>
      <div class="pro-title">Chaguo 3 — Auto-Broadcast kutoka MTEJA Servers</div>
      <div class="pro-sub">Andika amri moja WhatsApp na wateja wote wanapokea ujumbe mara moja — hakuna kubonyeza, hakuna kufungua mazungumzo, moja kwa moja.</div>
      <ul class="pro-feat">
        <li>Amri moja WhatsApp inatuma kwa wateja wote</li>
        <li>Ujumbe unatumwa kutoka namba rasmi ya MTEJA</li>
        <li>Majibu ya wateja yanakuja kwenye dashboard yako</li>
        <li>Panga broadcasts mapema</li>
        <li>Uthibitisho wa utoaji na usomaji kwa kila mteja</li>
        <li>Mfululizo wa follow-up wa moja kwa moja</li>
      </ul>
      <button class="pro-cta" onclick="alert('Asante! MTEJA Pro inakuja hivi karibuni. Utaarifiwa ukitoka.')">🚀 Niarifu Itakapotoka</button>
    </div>`;
}

function go(id,btn){
  ["ov","cu","tx","fu","bc"].forEach(x=>document.getElementById("p"+x).style.display=x===id?"block":"none");
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));btn.classList.add("on");
}

window.addEventListener("load",async()=>{
  const s=localStorage.getItem("m_session");if(!s)return;
  try{const{phone,code}=JSON.parse(s);const{data,error}=await SB.from("businesses").select("*").eq("phone",phone).eq("code",code).single();
  if(data&&!error){BIZ=data;showApp();}else localStorage.removeItem("m_session");}
  catch(e){localStorage.removeItem("m_session");}
});
</script>
</body>
</html>
