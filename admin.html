<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MTEJA AI — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080C14;--surface:#0E1420;--card:#131B2A;--card-hover:#172033;
  --border:rgba(255,255,255,0.07);--border-focus:rgba(16,185,129,0.5);
  --green:#10B981;--green-dim:rgba(16,185,129,0.12);
  --amber:#F59E0B;--amber-dim:rgba(245,158,11,0.12);
  --purple:#8B5CF6;--purple-dim:rgba(139,92,246,0.12);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,0.12);
  --red:#EF4444;--red-dim:rgba(239,68,68,0.12);
  --text:#F0F4F8;--text-muted:#6B7A99;--text-dim:#2D3A52;
  --font:'Outfit',sans-serif;--mono:'DM Mono',monospace;
  --r:14px;--r-sm:9px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased}
.app{min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:48px}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(8,12,20,0.93);backdrop-filter:blur(16px);padding:13px 16px 10px;border-bottom:1px solid var(--border)}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#10B981,#059669);display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 0 18px rgba(16,185,129,0.28);flex-shrink:0}
.logo-tx .nm{font-size:17px;font-weight:800;letter-spacing:-0.3px;line-height:1.1}
.logo-tx .sb{font-size:10px;color:var(--text-muted);font-weight:400;letter-spacing:0.6px;text-transform:uppercase}
.hdr-btns{display:flex;gap:8px}
.ic-btn{width:35px;height:35px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .18s;flex-shrink:0;font-family:var(--font)}
.ic-btn:hover{background:var(--card-hover);color:var(--text)}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status{display:flex;align-items:center;gap:6px;margin-top:8px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.status span{font-size:11px;color:var(--text-muted);font-weight:500}

/* CONTENT */
.pg{padding:16px}

/* STATS */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:14px 14px 12px;position:relative;overflow:hidden;transition:transform .15s}
.sc:active{transform:scale(.97)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:var(--r) var(--r) 0 0}
.sc.g::before{background:var(--green)}.sc.b::before{background:var(--blue)}
.sc.a::before{background:var(--amber)}.sc.p::before{background:var(--purple)}
.si{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:10px}
.sc.g .si{background:var(--green-dim)}.sc.b .si{background:var(--blue-dim)}
.sc.a .si{background:var(--amber-dim)}.sc.p .si{background:var(--purple-dim)}
.sl{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.sv{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.5px}
.sv.sm{font-size:18px}
.sc.g .sv{color:var(--green)}.sc.b .sv{color:var(--blue)}
.sc.a .sv{color:var(--amber)}.sc.p .sv{color:var(--purple)}
.ss{font-size:10px;color:var(--text-muted);margin-top:3px;font-weight:500}

/* REG BUTTON */
.reg-btn{width:100%;padding:15px;border-radius:var(--r);background:linear-gradient(135deg,#10B981,#059669);color:#fff;font-family:var(--font);font-size:15px;font-weight:700;letter-spacing:.2px;border:none;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(16,185,129,0.25);transition:all .18s}
.reg-btn:active{transform:scale(.98)}

/* SECTION */
.sec{margin-bottom:16px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-tt{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.badge{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--text-muted);font-family:var(--mono)}

/* CLIENT CARD */
.cc{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:14px;margin-bottom:8px;transition:all .18s;animation:sli .25s ease}
@keyframes sli{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cc:hover{border-color:rgba(255,255,255,0.12);background:var(--card-hover)}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.cc-name{font-size:15px;font-weight:700;margin-bottom:2px;line-height:1.2}
.cc-type{font-size:11px;color:var(--text-muted);text-transform:capitalize}
.cc-meta{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:11px;font-weight:500;background:var(--green-dim);color:var(--green);padding:3px 8px;border-radius:5px;border:1px solid rgba(16,185,129,.2)}
.ow{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.rm-btn{flex-shrink:0;width:32px;height:32px;border-radius:8px;background:var(--red-dim);border:1px solid rgba(239,68,68,.2);color:var(--red);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .18s;font-family:var(--font)}
.rm-btn:hover{background:rgba(239,68,68,.22);transform:scale(1.05)}
.rm-btn:active{transform:scale(.95)}

/* EMPTY */
.empty{text-align:center;padding:36px 16px;background:var(--card);border-radius:var(--r);border:1px dashed var(--border)}
.empty .ei{font-size:32px;margin-bottom:10px;opacity:.5}
.empty p{font-size:14px;color:var(--text-muted)}

/* LOADER */
.ld{display:flex;align-items:center;justify-content:center;padding:40px;gap:6px}
.ld span{width:8px;height:8px;border-radius:50%;background:var(--green);animation:bo .8s infinite}
.ld span:nth-child(2){animation-delay:.15s}.ld span:nth-child(3){animation-delay:.3s}
@keyframes bo{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* OVERLAY */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;animation:fo .2s ease}
@keyframes fo{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:20px 20px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:8px 16px 36px;animation:su .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:40px;height:4px;border-radius:2px;background:var(--text-dim);margin:10px auto 18px}
.m-tt{font-size:20px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px}
.m-sb{font-size:13px;color:var(--text-muted);margin-bottom:22px}

/* FORM */
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.fi{width:100%;padding:13px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:15px;font-weight:500;outline:none;transition:border-color .18s;-webkit-appearance:none;appearance:none}
.fi:focus{border-color:var(--border-focus)}
.fi::placeholder{color:var(--text-dim)}
.fi option{background:var(--card)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sub-btn{width:100%;padding:15px;border-radius:var(--r-sm);background:linear-gradient(135deg,#10B981,#059669);color:#fff;font-family:var(--font);font-size:15px;font-weight:700;border:none;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(16,185,129,.25);transition:all .18s}
.sub-btn:disabled{opacity:.6;cursor:not-allowed}
.sub-btn:not(:disabled):active{transform:scale(.98)}
.can-btn{width:100%;padding:13px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .18s}
.can-btn:hover{background:var(--card);color:var(--text)}

/* CONFIRM */
.ov.mid{align-items:center}
.conf{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:22px;width:calc(100% - 48px);max-width:320px;animation:ci .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes ci{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.conf .ico{font-size:34px;text-align:center;margin-bottom:10px}
.conf h3{font-size:17px;font-weight:800;text-align:center;margin-bottom:6px}
.conf p{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:20px;line-height:1.55}
.conf-acts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cy{padding:13px;border-radius:var(--r-sm);background:var(--red);border:none;color:#fff;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.cy:active{transform:scale(.97)}
.cn{padding:13px;border-radius:var(--r-sm);background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.cn:active{transform:scale(.97)}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:400;padding:12px 22px;border-radius:50px;font-size:13px;font-weight:600;white-space:nowrap;animation:ti .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:none}
@keyframes ti{from{opacity:0;transform:translate(-50%,18px)}to{opacity:1;transform:translate(-50%,0)}}
.toast.ok{background:var(--green);color:#fff}
.toast.err{background:var(--red);color:#fff}
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-top">
      <div class="logo">
        <div class="logo-ic">📊</div>
        <div class="logo-tx">
          <div class="nm">MTEJA AI</div>
          <div class="sb">Admin Dashboard</div>
        </div>
      </div>
      <div class="hdr-btns">
        <button class="ic-btn" id="refreshBtn" onclick="loadAll(true)" title="Refresh">⟳</button>
        <button class="ic-btn" onclick="logout()" title="Logout">⏻</button>
      </div>
    </div>
    <div class="status">
      <div class="dot"></div>
      <span>Live · Kisumu, Kenya</span>
    </div>
  </header>

  <div class="pg">
    <!-- STATS -->
    <div class="grid">
      <div class="sc g">
        <div class="si">🏪</div>
        <div class="sl">Businesses</div>
        <div class="sv" id="sBiz">—</div>
        <div class="ss">Registered</div>
      </div>
      <div class="sc b">
        <div class="si">👥</div>
        <div class="sl">Customers</div>
        <div class="sv" id="sCust">—</div>
        <div class="ss">Logged total</div>
      </div>
      <div class="sc a">
        <div class="si">💰</div>
        <div class="sl">Transactions</div>
        <div class="sv" id="sTx">—</div>
        <div class="ss">All time</div>
      </div>
      <div class="sc p">
        <div class="si">📈</div>
        <div class="sl">Revenue</div>
        <div class="sv sm" id="sRev">Ksh —</div>
        <div class="ss">Tracked</div>
      </div>
    </div>

    <!-- REGISTER BUTTON -->
    <button class="reg-btn" onclick="openModal()">＋ Register New Client</button>

    <!-- CLIENTS LIST -->
    <div class="sec">
      <div class="sec-hd">
        <span class="sec-tt">🏢 Registered Clients</span>
        <span class="badge" id="clientCount">0</span>
      </div>
      <div id="clientList">
        <div class="ld"><span></span><span></span><span></span></div>
      </div>
    </div>
  </div>
</div>

<!-- REGISTER MODAL -->
<div class="ov" id="regModal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="handle"></div>
    <div class="m-tt">Register Client</div>
    <div class="m-sb">Add a new business to MTEJA AI</div>
    <div class="fg">
      <label class="fl">Business Name *</label>
      <input class="fi" id="fName" placeholder="e.g. Warembo Super Saloon">
    </div>
    <div class="fr">
      <div class="fg">
        <label class="fl">Owner Name *</label>
        <input class="fi" id="fOwner" placeholder="Full name">
      </div>
      <div class="fg">
        <label class="fl">Phone *</label>
        <input class="fi" id="fPhone" placeholder="07XX XXX XXX" type="tel">
      </div>
    </div>
    <div class="fg">
      <label class="fl">Business Type *</label>
      <select class="fi" id="fType">
        <option value="">Select type…</option>
        <option value="salon">Salon</option>
        <option value="barbershop">Barbershop</option>
        <option value="restaurant">Restaurant</option>
        <option value="hotel">Hotel</option>
        <option value="boutique">Boutique</option>
        <option value="pharmacy">Pharmacy</option>
        <option value="electronics">Electronics</option>
        <option value="hardware">Hardware</option>
        <option value="supermarket">Supermarket</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="fg">
      <label class="fl">Location</label>
      <input class="fi" id="fLoc" placeholder="e.g. Kondele, Kisumu">
    </div>
    <button class="sub-btn" id="subBtn" onclick="submitClient()">✓ Register Client</button>
    <button class="can-btn" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- CONFIRM REMOVE -->
<div class="ov mid" id="confModal" style="display:none" onclick="if(event.target===this)closeConf()">
  <div class="conf">
    <div class="ico">⚠️</div>
    <h3>Remove Client?</h3>
    <p id="confText">This will permanently remove this client from MTEJA AI.</p>
    <div class="conf-acts">
      <button class="cn" onclick="closeConf()">Cancel</button>
      <button class="cy" onclick="confirmRemove()">Remove</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" style="display:none"></div>

<script>
const API = "https://mteja-ai.onrender.com";
let clients = [];
let removeTarget = null;

/* ── FETCH DATA ── */
async function loadAll(isRefresh = false) {
  if (isRefresh) {
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("spin");
  }
  try {
    const [sRes, cRes] = await Promise.allSettled([
      fetch(API + "/api/stats"),
      fetch(API + "/api/businesses")
    ]);

    if (sRes.status === "fulfilled" && sRes.value.ok) {
      const d = await sRes.value.json();
      document.getElementById("sBiz").textContent  = d.businesses  ?? d.total_businesses  ?? 0;
      document.getElementById("sCust").textContent = d.customers   ?? d.total_customers   ?? 0;
      document.getElementById("sTx").textContent   = d.transactions?? d.total_transactions?? 0;
      const rev = d.revenue ?? d.total_revenue ?? 0;
      document.getElementById("sRev").textContent  = "Ksh " + fmtRev(rev);
    }

    if (cRes.status === "fulfilled" && cRes.value.ok) {
      const d = await cRes.value.json();
      clients = Array.isArray(d) ? d : (d.businesses ?? d.clients ?? []);
      renderClients();
    } else {
      renderClients();
    }
  } catch(e) {
    renderClients();
  } finally {
    if (isRefresh) {
      document.getElementById("refreshBtn").classList.remove("spin");
    }
  }
}

function fmtRev(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + "M";
  if (n >= 1000)    return (n/1000).toFixed(1) + "K";
  return n.toLocaleString();
}

/* ── RENDER CLIENTS ── */
function renderClients() {
  const el = document.getElementById("clientList");
  document.getElementById("clientCount").textContent = clients.length;

  if (clients.length === 0) {
    el.innerHTML = `<div class="empty"><div class="ei">🏪</div><p>No clients yet — register the first one!</p></div>`;
    return;
  }

  el.innerHTML = clients.map(c => {
    const id   = c.phone ?? c.id ?? c._id;
    const name = c.name ?? c.business_name ?? "Unknown";
    const type = c.type ?? c.business_type ?? "business";
    const code = c.code ?? c.business_code ?? "";
    const owner= c.owner_name ?? c.owner ?? "";
    const phone= c.phone ?? "";
    return `
    <div class="cc" id="card-${id}">
      <div class="cc-top">
        <div>
          <div class="cc-name">${name}</div>
          <div class="cc-type">${type}</div>
        </div>
        <button class="rm-btn" onclick="askRemove('${id}','${name.replace(/'/g,"\\'")}')">✕</button>
      </div>
      <div class="cc-meta">
        ${code ? `<span class="chip">${code}</span>` : ""}
        ${owner? `<span class="ow">👤 ${owner}</span>` : ""}
        ${phone? `<span class="ow">📞 ${phone}</span>` : ""}
      </div>
    </div>`;
  }).join("");
}

/* ── REGISTER MODAL ── */
function openModal()  { document.getElementById("regModal").style.display = "flex"; }
function closeModal() { document.getElementById("regModal").style.display = "none"; clearForm(); }
function clearForm()  {
  ["fName","fOwner","fPhone","fType","fLoc"].forEach(id => {
    document.getElementById(id).value = "";
  });
}

async function submitClient() {
  const name  = document.getElementById("fName").value.trim();
  const owner = document.getElementById("fOwner").value.trim();
  const phone = document.getElementById("fPhone").value.trim();
  const type  = document.getElementById("fType").value;
  const loc   = document.getElementById("fLoc").value.trim();

  if (!name || !owner || !phone || !type) {
    showToast("Fill in all required fields", "err"); return;
  }

  const btn = document.getElementById("subBtn");
  btn.disabled = true;
  btn.textContent = "Registering…";

  try {
    const res = await fetch(API + "/api/businesses", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ business_name: name, owner_name: owner, phone, business_type: type, location: loc })
    });
    if (res.ok) {
      const data = await res.json();
      const newClient = data.business ?? data;
      clients.unshift(newClient);
      renderClients();
      closeModal();
      showToast("✓ Client registered!");
      loadAll(false); // refresh stats
    } else {
      const err = await res.json().catch(() => ({}));
      showToast(err.message ?? "Registration failed", "err");
    }
  } catch(e) {
    showToast("Network error — check connection", "err");
  } finally {
    btn.disabled = false;
    btn.textContent = "✓ Register Client";
  }
}

/* ── REMOVE ── */
function askRemove(id, name) {
  removeTarget = id;
  document.getElementById("confText").innerHTML =
    `This will permanently remove <strong>${name}</strong> from MTEJA AI.`;
  document.getElementById("confModal").style.display = "flex";
}
function closeConf() {
  removeTarget = null;
  document.getElementById("confModal").style.display = "none";
}

async function confirmRemove() {
  if (!removeTarget) return;
  const id = removeTarget;
  closeConf();
  try {
    const res = await fetch(API + "/api/businesses/" + encodeURIComponent(id), { method: "DELETE" });
    if (res.ok) {
      clients = clients.filter(c => (c.id ?? c._id ?? c.business_code ?? c.phone) != id);
      renderClients();
      showToast("Client removed");
      loadAll(false);
    } else {
      showToast("Could not remove client", "err");
    }
  } catch {
    showToast("Network error", "err");
  }
}

/* ── TOAST ── */
let toastTimer;
function showToast(msg, type = "ok") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast " + type;
  el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = "none"; }, 3000);
}

/* ── LOGOUT ── */
function logout() {
  if (confirm("Log out of dashboard?")) {
    window.location.href = "index.html";
  }
}

/* ── INIT ── */
loadAll();
</script>
</body>
</html>
